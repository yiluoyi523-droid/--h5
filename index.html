<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成优网企业服务</title>
  <style>
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      font-family:"Microsoft YaHei", Arial, sans-serif;
      background:#f4f7fb;
      color:#1f2937;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .panel {
      width:100%;
      max-width:560px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:10px;
      box-shadow:0 12px 30px rgba(15,23,42,0.08);
      padding:24px 20px;
      text-align:center;
    }
    h1 { margin:0 0 12px; color:#1267d8; font-size:24px; }
    p { margin:8px 0; color:#4b5563; line-height:1.7; font-size:16px; }
    .notice {
      margin-top:16px;
      padding:13px 14px;
      border-radius:8px;
      background:#fff7f5;
      border:1px solid #efc3bc;
      color:#7a271a;
      text-align:left;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>成优网企业服务</h1>
    <p>企业会员开通已升级为专属付款链接。</p>
    <div class="notice">
      请使用客服发送的 30 分钟有效付款链接访问。固定公开页面不再提供付款入口，链接过期或提交后需重新获取。
    </div>
  </main>
</body>
</html>
